<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToursUmbria | Historiadora del Arte & Guía Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --terracota: #B7410E; --crema: #FFFBF5; --oscuro: #2D3748; --verde-wa: #25D366; }
        body { font-family: 'Lato', sans-serif; margin: 0; background-color: var(--crema); color: var(--oscuro); line-height: 1.6; }
        
        header { background: white; padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--terracota); }
        .logo { max-width: 200px; margin-bottom: 15px; }
        .contact-bar { font-weight: bold; font-size: 0.9rem; margin-top: 10px; }
        .contact-bar a { color: var(--oscuro); text-decoration: none; margin: 0 15px; }

        /* Hero - Triple Panorámica */
        .hero-vistas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #000; }
        .hero-vistas img { width: 100%; height: 400px; object-fit: cover; opacity: 0.9; transition: 0.5s; }
        .hero-vistas img:hover { opacity: 1; }

        .intro-text { padding: 60px 20px; text-align: center; max-width: 800px; margin: auto; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--terracota); margin-bottom: 10px; }
        .badge { border: 1px solid var(--terracota); color: var(--terracota); padding: 5px 15px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }

        /* Secciones de Experiencias */
        .section-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 2.2rem; margin: 50px 0 30px; }
        
        .grid-tours { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 0 20px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card-content { padding: 20px; text-align: center; }
        .card h3 { color: var(--terracota); margin-top: 0; }

        /* Galería de Detalles */
        .detalles-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; padding: 40px 20px; background: #f9f4f0; }
        .detalles-container img { width: 22%; min-width: 200px; height: 250px; object-fit: cover; border-radius: 8px; }

        /* Cierre con Panorámica Final */
        .final-call { position: relative; text-align: center; color: white; padding: 100px 20px; }
        .final-bg { position: absolute; top:0; left:0; width:100%; height:100%; z-index: -1; }
        .final-bg img { width:100%; height:100%; object-fit: cover; filter: brightness(0.6); }

        .btn-wa { background: var(--verde-wa); color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.1rem; display: inline-block; transition: 0.3s; }
        .btn-wa:hover { background: #1ebe57; transform: scale(1.05); }

        footer { background: var(--oscuro); color: white; text-align: center; padding: 40px 20px; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .hero-vistas { grid-template-columns: 1fr; }
            .hero-vistas img { height: 250px; }
            h1 { font-size: 2rem; }
            .detalles-container img { width: 45%; }
        }
    </style>
</head>
<body>

<header>
    <img src="logo Toursumbria.png" alt="ToursUmbria" class="logo">
    <div class="contact-bar">
        <a href="mailto:info.toursumbria@gmail.com">✉ info.toursumbria@gmail.com</a>
        <a href="https://wa.me/393883881471" style="color: var(--verde-wa)">✆ +39 388 388 1471</a>
    </div>
</header>

<section class="hero-vistas">
    <img src="panoramica iz.jpg" alt="Asís Vista Izquierda">
    <img src="panoramica fro.jpg" alt="Asís Vista Frontal">
    <img src="panoramicade.jpg" alt="Asís Vista Derecha">
</section>

<div class="intro-text">
    <span class="badge">Guía Oficial
